version: "3.8"

services:

  frontend:
    build:
      context: ./frontend/docker_frontend
      dockerfile: Dockerfile
    init: true
    ports:
      - "5173:5173"

    volumes:
      # Bind mount source code for hot reload
      - type: bind
        source: ./frontend/docker_frontend
        target: /usr/src/app

      # Isolate node_modules inside container
      - type: volume
        target: /usr/src/app/node_modules

    environment:
      - CHOKIDAR_USEPOLLING=true

    networks:
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    init: true

    ports:
      - "5000:5000"

    volumes:
      # Bind backend source code
      - type: bind
        source: ./backend
        target: /usr/src/app

      # Protect container dependencies
      - type: volume
        target: /usr/src/app/node_modules

    #environment:
    # - CHOKIDAR_USEPOLLING=true

    networks:
      - backend
    restart: unless-stopped

networks:
  frontend:
  backend: